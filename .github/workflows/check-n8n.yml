name: Monitor n8n Workflow

on:
  schedule:
    # Runs every 13 minutes (at minutes 0, 13, 26, 39, 52 of every hour)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allows manual trigger for testing

jobs:
  check-n8n-health:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check current time
        run: |
          echo "🕐 Checking n8n workflow at $(date)"
      
      - name: Call n8n webhook
        id: n8n_request
        run: |
          echo "📡 Sending request to n8n..."
          
          # Using credentials from secrets (recommended)
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -u "${{ secrets.N8N_USERNAME }}:${{ secrets.N8N_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions" \
            "${{ secrets.N8N_WEBHOOK_URL }}")
          
          # Alternative: using hardcoded credentials (if you didn't create secrets)
          # response=$(curl -s -w "\n%{http_code}" -X POST \
          #   -u "admin:123" \
          #   -H "Content-Type: application/json" \
          #   "${{ secrets.N8N_WEBHOOK_URL }}")
          
          # Split response into body and status code
          http_code=$(echo "$response" | tail -n1)
          response_body=$(echo "$response" | sed '$d')
          
          # Save for later steps
          echo "status=$http_code" >> $GITHUB_OUTPUT
          echo "body=$response_body" >> $GITHUB_OUTPUT
          
          # Display results
          echo "✅ HTTP Status: $http_code"
          echo "📦 Response: $response_body"
          
          # Also save full response for debugging
          echo "full_response<<EOF" >> $GITHUB_OUTPUT
          echo "$response" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Validate response
        id: validation
        run: |
          STATUS="${{ steps.n8n_request.outputs.status }}"
          BODY='${{ steps.n8n_request.outputs.body }}'
          
          echo "🔍 Validating response..."
          
          # Check if status is 200 and body contains success:true
          if [ "$STATUS" == "200" ] && [[ "$BODY" == *"success"* ]] && [[ "$BODY" == *"true"* ]]; then
            echo "✅ n8n workflow is healthy!"
            echo "alert_needed=false" >> $GITHUB_OUTPUT
            echo "message=All good!" >> $GITHUB_OUTPUT
          else
            echo "❌ n8n workflow check failed!"
            echo "alert_needed=true" >> $GITHUB_OUTPUT
            echo "message=Check failed - Status: $STATUS, Response: $BODY" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Telegram alert on failure
        if: steps.validation.outputs.alert_needed == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ steps.n8n_request.outputs.status }}
          BODY: ${{ steps.n8n_request.outputs.body }}
        run: |
          echo "📱 Sending Telegram alert..."
          
          # Format the message
          MESSAGE="🚨 *n8n Monitor Alert* 🚨%0A"
          MESSAGE="${MESSAGE}Time: $(date -u)%0A"
          MESSAGE="${MESSAGE}Status: HTTP ${STATUS}%0A"
          MESSAGE="${MESSAGE}Response: ${BODY}%0A"
          MESSAGE="${MESSAGE}Expected: {success: true} with 200 status%0A"
          MESSAGE="${MESSAGE}Repository: ${{ github.repository }}%0A"
          MESSAGE="${MESSAGE}Workflow: ${{ github.workflow }}"
          
          # Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown"
          
          echo "✅ Alert sent!"
      
      - name: Send success notification (optional)
        if: steps.validation.outputs.alert_needed == 'false'
        run: |
          echo "✅ n8n is healthy - no alert needed"
          # You could also send a daily success report if needed
      
      - name: Summary
        run: |
          echo "═══════════════════════════════════════"
          echo "📊 MONITORING SUMMARY"
          echo "═══════════════════════════════════════"
          echo "🕐 Time: $(date)"
          echo "📡 Webhook: ${{ secrets.N8N_WEBHOOK_URL }}"
          echo "📟 Status: ${{ steps.n8n_request.outputs.status }}"
          echo "📦 Response: ${{ steps.n8n_request.outputs.body }}"
          echo "🚨 Alert sent: ${{ steps.validation.outputs.alert_needed }}"
          echo "═══════════════════════════════════════"
