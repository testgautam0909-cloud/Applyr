name: Monitor n8n Workflow

on:
  schedule:
    - cron: '*/13 * * * *'
  workflow_dispatch:

jobs:
  check-n8n-health:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check current time
        run: |
          echo "🕐 Checking n8n workflow at $(date)"
      
      - name: Test n8n connectivity with verbose output
        id: n8n_request
        run: |
          echo "📡 Testing connection to n8n..."
          echo "URL: ${{ secrets.N8N_WEBHOOK_URL }}"
          
          # First, try a simple curl without auth to see if the endpoint is reachable
          echo "🔍 Testing basic connectivity..."
          curl -I -v "${{ secrets.N8N_WEBHOOK_URL }}" 2>&1 || true
          
          echo ""
          echo "🔍 Testing with authentication..."
          
          # Try with curl and capture full output
          response=$(curl -v -s -w "\n%{http_code}" -X POST \
            -u "admin:123" \
            -H "Content-Type: application/json" \
            --connect-timeout 10 \
            --max-time 30 \
            "${{ secrets.N8N_WEBHOOK_URL }}" 2>&1) || true
          
          echo "Full response:"
          echo "$response"
          
          # Try to extract status code (last line)
          http_code=$(echo "$response" | tail -n1)
          echo "Status code: $http_code"
          
          # Save for later steps
          echo "status=$http_code" >> $GITHUB_OUTPUT