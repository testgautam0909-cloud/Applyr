<div class="table-container glass-card overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0 premium-table">
            <thead app-job-table-header class="table-light-glass" [sortColumn]="sortColumn"
                [sortDirection]="sortDirection" (sort)="sort.emit($event)">
            </thead>

            <tbody>
                @for (job of jobs; track job.id) {
                <tr app-job-table-row [job]="job" (updateField)="updateField.emit($event)"
                    (delete)="delete.emit($event)" (openContacts)="onOpenContacts($event)"
                    (addContact)="onAddContact($event)" (openTechStack)="onOpenTechStack($event)"
                    (openJD)="openJD.emit($event)">
                </tr>
                } @empty {
                <tr>
                    <td colspan="9" class="text-center py-5">
                        <div class="empty-state-glow mb-3">
                            <i class="bi bi-inbox fs-1 text-primary"></i>
                        </div>
                        <h5 class="fw-bold mb-1">No applications yet</h5>
                        <p class="text-muted small">Your future job is waiting to be added!</p>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
