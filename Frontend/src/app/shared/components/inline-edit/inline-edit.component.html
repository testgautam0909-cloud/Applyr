<div class="inline-edit-container" [class.editing]="isEditing()">
    <!-- DISPLAY MODE -->
    <div *ngIf="!isEditing()" class="display-wrapper" (click)="startEdit()">
        <span class="value-text">{{ type === 'date' ? (value | date:'dd MMM yyyy') : (value || placeholder) }}</span>
        <i *ngIf="showIcon" class="bi bi-pencil-fill edit-hint ms-2"></i>
    </div>

    <!-- EDIT MODE -->
    <div *ngIf="isEditing()" class="edit-wrapper d-flex gap-1 align-items-center">
        <input *ngIf="type !== 'select'" #inputField [type]="type" class="form-control form-control-sm premium-input"
            [(ngModel)]="editValue" (keydown.enter)="saveEdit()" (keydown.escape)="cancelEdit()" (blur)="onBlur()"
            [placeholder]="placeholder" autofocus>

        <select *ngIf="type === 'select'" #selectField class="form-select form-select-sm premium-input"
            [(ngModel)]="editValue" (keydown.enter)="saveEdit()" (keydown.escape)="cancelEdit()" (blur)="onBlur()"
            autofocus>
            <option *ngFor="let opt of options" [value]="opt">{{ opt }}</option>
        </select>

        <div class="action-buttons">
            <button class="btn btn-done" (click)="saveEdit()">
                <i class="bi bi-check-lg"></i>
            </button>
            <button class="btn btn-cancel" (click)="cancelEdit()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
</div>
